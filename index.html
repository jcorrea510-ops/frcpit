<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3950 | FRC Pit Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --bg: #09090b;
            --card: #18181b;
            --text: #e4e4e7;
            --text-muted: #a1a1aa;
            --accent: #3b82f6;
            --green: #10b981;
            --red-bg: rgba(239, 68, 68, 0.15);
            --red-border: #ef4444;
            --blue-bg: rgba(59, 130, 246, 0.15);
            --blue-border: #3b82f6;
            --border: #27272a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 25px; 
        }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; }
        #clock { font-variant-numeric: tabular-nums; font-size: 2.5rem; font-weight: 800; color: var(--accent); }
        .sync-status { font-size: 0.8rem; color: var(--text-muted); margin-top: 5px; }

        /* Status Bar */
        .status-bar { 
            background: var(--card); border: 1px solid var(--border); border-left: 5px solid var(--green); 
            padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; font-weight: 600; font-size: 1.1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
        .card h2 { margin-top: 0; font-size: 1rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

        /* Lists & Tables */
        .list-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .list-row:last-child { border-bottom: none; }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 800; }
        .badge-live { background: rgba(16, 185, 129, 0.2); color: var(--green); animation: pulse 2s infinite; }
        .badge-default { background: rgba(255,255,255,0.1); color: var(--text-muted); }

        /* Scoreboard */
        .score-box { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .alliance-score { padding: 20px; border-radius: 12px; width: 40%; text-align: center; font-size: 3.5rem; font-weight: 800; font-variant-numeric: tabular-nums; }
        .red { background: var(--red-bg); border: 2px solid var(--red-border); color: #fca5a5; }
        .blue { background: var(--blue-bg); border: 2px solid var(--blue-border); color: #93c5fd; }
        
        .highlight { background: rgba(59, 130, 246, 0.1); border-radius: 6px; padding: 0 10px; margin: -5px -10px; }
        .empty-state { color: var(--text-muted); text-align: center; padding: 20px 0; font-style: italic; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>Long Island Regional</h1>
        <div class="sync-status" id="nexus-status">Waiting for sync...</div>
    </div>
    <div id="clock">00:00:00 AM</div>
</div>

<div class="status-bar">
    <div>CURRENTLY QUEUING: <span id="now-queuing" style="color: var(--accent);">--</span></div>
</div>

<div class="grid">
    <div class="card">
        <h2>Our Matches (3950)</h2>
        <div id="team-schedule"><div class="empty-state">Loading schedule...</div></div>
    </div>

    <div class="card">
        <h2>Rankings (Top 15)</h2>
        <div id="rankings"><div class="empty-state">Loading rankings...</div></div>
    </div>
</div>

<div class="card" style="margin-top: 20px;">
    <h2 id="live-header" style="text-align: center; color: var(--text);">ACTIVE MATCH SCORE</h2>
    <div class="score-box" id="score-container">
        <div class="alliance-score red" id="red-score">0</div>
        <div style="font-size: 1.5rem; font-weight: 800; color: var(--border);">VS</div>
        <div class="alliance-score blue" id="blue-score">0</div>
    </div>
</div>

<script>
    const TBA_KEY = 'aarQMLYkn3tn4LX2UPkoBcMEkNnwyN4vglGipehna9VjUWdWcvnmYGSE2bAM6HdL';
    const NEXUS_KEY = 'wz4xuiQTrG49lx3Jr69rvEkIv9A';
    const EVENT_KEY = '2026nyli2'; 
    const TEAM_NUM = '3950';

    // Update Clock Fast
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-US', { hour12: true });
    }, 1000);

    async function updateDashboard() {
        
        // --- 1. NEXUS (Queuing & Schedule) ---
        try {
            const nRes = await fetch(`https://frc.nexus/api/v1/event/${EVENT_KEY}`, { headers: { 'Nexus-Api-Key': NEXUS_KEY } });
            if (nRes.ok) {
                const nData = await nRes.json();
                document.getElementById('now-queuing').innerText = nData.nowQueuing || "BREAK / STANDBY";
                document.getElementById('nexus-status').innerText = `Nexus Last Sync: ${new Date(nData.dataAsOfTime).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', hour12: true})}`;

                if (nData.matches && Array.isArray(nData.matches)) {
                    // Safe string filter so we don't crash on undefined properties
                    const teamMatches = nData.matches.filter(m => JSON.stringify(m).includes(TEAM_NUM));
                    renderOurSchedule(teamMatches);
                }
            } else {
                throw new Error("Bad status");
            }
        } catch (err) {
            console.error("Nexus failed:", err);
            document.getElementById('nexus-status').innerText = "Nexus Sync Error. Retrying soon...";
            if(document.getElementById('team-schedule').innerHTML.includes("Loading")) {
                document.getElementById('team-schedule').innerHTML = `<div class="empty-state">Waiting on match data...</div>`;
            }
        }

        // --- 2. TBA RANKINGS ---
        try {
            const rRes = await fetch(`https://www.thebluealliance.com/api/v3/event/${EVENT_KEY}/rankings`, { headers: { 'X-TBA-Auth-Key': TBA_KEY } });
            if (rRes.ok) {
                const rData = await rRes.json();
                if (rData.rankings && rData.rankings.length > 0) renderRankings(rData.rankings);
                else document.getElementById('rankings').innerHTML = `<div class="empty-state">Ranks not posted yet</div>`;
            }
        } catch (err) {
            console.error("Rankings failed:", err);
            if(document.getElementById('rankings').innerHTML.includes("Loading")) {
                document.getElementById('rankings').innerHTML = `<div class="empty-state">Unable to load rankings.</div>`;
            }
        }

        // --- 3. TBA LIVE SCORES ---
        try {
            const mRes = await fetch(`https://www.thebluealliance.com/api/v3/event/${EVENT_KEY}/matches/simple`, { headers: { 'X-TBA-Auth-Key': TBA_KEY } });
            if (mRes.ok) {
                const mData = await mRes.json();
                if (Array.isArray(mData)) renderLiveScore(mData);
            }
        } catch (err) {
            console.error("Scores failed:", err);
        }
    }

    // --- RENDER FUNCTIONS ---
    function renderOurSchedule(matches) {
        if (matches.length === 0) {
            document.getElementById('team-schedule').innerHTML = `<div class="empty-state">No matches scheduled yet.</div>`;
            return;
        }
        
        let html = '';
        matches.forEach(m => {
            const label = m.label || m.matchNumber || "Match";
            const time = m.estimatedTime ? new Date(m.estimatedTime).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: true}) : "TBD";
            const statusStr = m.status ? m.status.toUpperCase() : "SCHEDULED";
            const badgeClass = statusStr === 'QUEUING' ? 'badge badge-live' : 'badge badge-default';
            
            html += `
            <div class="list-row">
                <strong style="font-size: 1.1rem;">${label}</strong>
                <span style="color: var(--text-muted);">${time}</span>
                <span class="${badgeClass}">${statusStr}</span>
            </div>`;
        });
        document.getElementById('team-schedule').innerHTML = html;
    }

    function renderRankings(ranks) {
        let html = `
        <div style="display:flex; justify-content:space-between; color:var(--text-muted); font-size:0.8rem; font-weight:bold; padding-bottom:8px; border-bottom:1px solid var(--border);">
            <div style="width:10%;">#</div><div style="width:30%;">TEAM</div><div style="width:30%; text-align:center;">RP</div><div style="width:30%; text-align:right;">W-L-T</div>
        </div>`;
        
        ranks.slice(0, 15).forEach(r => {
            const isUs = r.team_key === `frc${TEAM_NUM}` ? 'highlight' : '';
            html += `
            <div class="list-row ${isUs}">
                <div style="width:10%; font-weight:bold;">${r.rank}</div>
                <div style="width:30%; font-weight:bold; color:var(--text);">${r.team_key.substring(3)}</div>
                <div style="width:30%; text-align:center;">${r.extra_stats[0]}</div>
                <div style="width:30%; text-align:right; font-variant-numeric:tabular-nums;">${r.record.wins}-${r.record.losses}-${r.record.ties}</div>
            </div>`;
        });
        document.getElementById('rankings').innerHTML = html;
    }

    function renderLiveScore(matches) {
        const played = matches.filter(m => m.alliances.red.score !== -1).sort((a,b) => b.time - a.time);
        if (played.length > 0) {
            const current = played[0];
            document.getElementById('live-header').innerText = `LATEST: ${current.comp_level.toUpperCase()} MATCH ${current.match_number}`;
            document.getElementById('red-score').innerText = current.alliances.red.score;
            document.getElementById('blue-score').innerText = current.alliances.blue.score;
        } else {
            document.getElementById('live-header').innerText = "AWAITING FIRST MATCH";
        }
    }

    // Initialize and loop
    updateDashboard();
    setInterval(updateDashboard, 20000); 
</script>
</body>
</html>
