<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3950 | LIVE Rankings</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        :root {
            --bg: #050505; --card: #111113; --text: #ffffff; --text-muted: #a1a1aa;
            --accent: #3b82f6; --border: #27272a;
        }
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 15px; overflow: hidden; height: 100vh;
        }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 10px; }
        #clock { font-size: 2rem; font-weight: 900; color: var(--accent); }
        
        .rank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: calc(100vh - 80px); }
        .rank-column { background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        
        .table-header { 
            display: grid; grid-template-columns: 35px 55px 45px 55px 65px 1fr; 
            padding: 8px 10px; background: #1c1c1f; font-size: 0.65rem; font-weight: 900; color: var(--text-muted); text-transform: uppercase;
        }
        .rank-row { 
            display: grid; grid-template-columns: 35px 55px 45px 55px 65px 1fr; 
            padding: 6px 10px; border-bottom: 1px solid #1c1c1f; align-items: center; font-size: 0.85rem; 
        }
        .rank-row:last-child { border-bottom: none; }
        
        .highlight { background: rgba(59, 130, 246, 0.3) !important; color: #fff; box-shadow: inset 4px 0 0 var(--accent); }
        .num-bold { font-weight: 800; }
        .avg-col { color: var(--accent); font-weight: 700; }
        .sync-indicator { font-size: 0.7rem; color: var(--text-muted); }
        
        span { white-space: nowrap; overflow: hidden; }
        .right { text-align: right; padding-right: 5px; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1 style="margin:0; font-size: 1.2rem; letter-spacing: 1px;">RANKINGS | LI REGIONAL</h1>
        <div class="sync-indicator" id="sync-status">Syncing TBA...</div>
    </div>
    <div id="clock">00:00:00</div>
</div>

<div class="rank-grid">
    <div class="rank-column" id="col-1"></div>
    <div class="rank-column" id="col-2"></div>
</div>

<script>
    const TEAM = '3950';
    const EVENT = '2026nyli2';
    const TBA_KEY = 'aarQMLYkn3tn4LX2UPkoBcMEkNnwyN4vglGipehna9VjUWdWcvnmYGSE2bAM6HdL';

    async function updateRankings() {
        try {
            const res = await fetch(`https://www.thebluealliance.com/api/v3/event/${EVENT}/rankings`, {
                headers: { 'X-TBA-Auth-Key': TBA_KEY }
            });
            const data = await res.json();
            if (!data.rankings) return;

            const half = Math.ceil(data.rankings.length / 2);
            renderColumn('col-1', data.rankings.slice(0, half));
            renderColumn('col-2', data.rankings.slice(half));

            document.getElementById('sync-status').innerText = `LIVE SYNC: ${new Date().toLocaleTimeString()}`;
        } catch (e) { console.error(e); }
    }

    function renderColumn(id, ranks) {
        let html = `
            <div class="table-header">
                <span>#</span><span>TEAM</span><span>RP</span><span>AVG</span><span>SCORE</span><span class="right">W-L-T</span>
            </div>`;

        ranks.forEach(r => {
            const isUs = r.team_key === `frc${TEAM}` ? 'highlight' : '';
            const avgRP = (r.extra_stats[0] / Math.max(1, r.matches_played)).toFixed(2);
            // sort_orders[1] is usually Average Match Score in recent FRC seasons
            const avgScore = r.sort_orders[1] ? r.sort_orders[1].toFixed(1) : '0.0';
            const record = `${r.record.wins}-${r.record.losses}-${r.record.ties}`;

            html += `
                <div class="rank-row ${isUs}">
                    <span class="num-bold">${r.rank}</span>
                    <span class="num-bold">${r.team_key.substring(3)}</span>
                    <span>${r.extra_stats[0]}</span>
                    <span class="avg-col">${avgRP}</span>
                    <span style="color:#fbbf24">${avgScore}</span>
                    <span class="right" style="color:var(--text-muted); font-size:0.75rem;">${record}</span>
                </div>`;
        });
        document.getElementById(id).innerHTML = html;
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour12: false});
    }, 1000);

    // Initial load + 5-second interval
    updateRankings();
    setInterval(updateRankings, 5000);
</script>
</body>
</html>
